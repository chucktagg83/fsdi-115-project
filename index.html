<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="./styles.css">

</head>
<body>

    <main class="page">
        <aside class="left">
            <div class="left-inner">
                <div class="img-card">
                    <img src="./images/left-top.jpg" alt="left-top">
                </div>
                <div class="img-card">
                    <img src="./images/left-bottom.jpg" alt="left-bottom">
                </div>
            </div>
        </aside>

        <section class="right">
            <div class="content">
                <h1 class="title">Register</h1>
                <form action="#" class="form">
                    <div class="grid">
                        <div class="field">
                            <label for="username">Username</label> 
                            <input type="text" id="username" name="username" placeholder="Enter your username" required>
                        </div>
                        <div class="field">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                    
                        <div class="field">  
                            <label for="phone">Phone</label>
                            <input type="tel" id="phone" name="phone" placeholder="+1 804 555 0123" required>
                        </div>  
                        <div class="field">
                            <label for="address">Address</label>
                            <textarea id="address" name="address" placeholder="Enter your address" required></textarea>
                        </div>
                        <div class="field">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="***********" required>
                        </div>
                        <div class="field">  
                            <label for="confirm">Confirm Password</label>
                            <input type="password" id="confirm" name="confirm" placeholder="***********" required>
                        </div>
                    </div>  
                    <div class="actions">
                        <button type="button" class="btn btn-outline" id="cancelbtn">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="submitbtn">Sign Up</button>
                    </div>
                </form>
            </div>

        </section>
    </main>

</body>
</html>
